<!doctype html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <title>ANAVOYD // SYSTEM_LINK</title>
    <link rel="stylesheet" href="../css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@300;600&family=JetBrains+Mono&display=swap" rel="stylesheet">
</head>
<body>

    <div class="crt-overlay"></div>

    <header>
        <div class="logo-wrapper">
            <img src="../images/anavoyd.png" alt="Anavoyd" class="brand-img">
        </div>
        <div class="status-panel">
            <span id="steamStatus">SYSTEM_OFFLINE</span>
            <a id="steamBtn" href="#" class="btn-link">AUTH_STEAM</a>
        </div>
    </header>

    <main>
        <section class="hero-data">
            <h1>CORAÇÃO_AMBISSAL</h1>
            <div class="progress-block">
                <div class="meta-txt">META: 50.000,00 BRL</div>
                <div class="bar-border">
                    <div id="progress" class="bar-fill"></div>
                </div>
                <div class="stats-txt">
                    <span id="currentAmount">R$ 0,00</span>
                    <span id="percentage">0%</span>
                </div>
            </div>
        </section>

        <section class="action-grid">
            <div class="panel">
                <div id="steamWarning" class="warning">!_AUTH_REQUIRED_TO_CONTRIBUTE</div>
                <div class="pix-btns" id="pixButtonsContainer">
                    <button class="b-pix" data-amount="20">20</button>
                    <button class="b-pix" data-amount="50">50</button>
                    <button class="b-pix" data-amount="100">100</button>
                    <button id="pixCustomBtn" class="b-pix custom">_OTHER</button>
                </div>
            </div>

            <div class="panel">
                <div id="currentTier">TIER: _VOID</div>
            </div>
        </section>
    </main>

    <div id="pixModal" class="modal">
        <div class="modal-box">
            <button id="closePixBtn" class="close-x">[CLOSE]</button>
            <div id="qrcode" class="qr-zone"></div>
            <input type="text" id="pixKeyDisplay" readonly>
            <button id="confirmPixBtn" class="btn-confirm">SEND_PAYMENT</button>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="../js/main.js"></script>
</body>
</html>
