<!doctype html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <title>ANAVOYD // PROJETO</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>

    <div class="noise-overlay"></div>

    <header>
        <div class="logo-box">
            <img src="../images/anavoyd.png" alt="Anavoyd" class="brand-img">
        </div>
        <nav class="user-nav">
            <span id="steamStatus">DESCONECTADO</span>
            <a id="steamBtn" href="#">LOGIN_STEAM</a>
        </nav>
    </header>

    <main>
        <section class="main-display">
            <h1 class="title">CORAÇÃO<br>AMBISSAL</h1>
            
            <div class="status-panel">
                <div class="row">
                    <span id="currentAmount">R$ 0,00</span>
                    <span id="percentage">0%</span>
                </div>
                <div class="progress-container">
                    <div id="progress" class="progress-bar"></div>
                </div>
            </div>
        </section>

        <section class="controls">
            <div class="card-donate">
                <div id="steamWarning">⚠️ LOGUE PARA PROSSEGUIR</div>
                <div class="grid-btns" id="pixButtonsContainer">
                    <button class="b-btn" data-amount="20">R$20</button>
                    <button class="b-btn" data-amount="50">R$50</button>
                    <button class="b-btn" data-amount="100">R$100</button>
                    <button id="pixCustomBtn" class="b-btn">OTHER</button>
                </div>
            </div>

            <div class="card-tier">
                <div id="currentTier">TIER ATUAL: NULL</div>
            </div>
        </section>
    </main>

    <div id="pixModal" class="modal">
        <div class="modal-inner">
            <button id="closePixBtn" class="close-x">FECHAR</button>
            <div id="qrcode" class="qr-box"></div>
            <input type="text" id="pixKeyDisplay" readonly>
            <button id="confirmPixBtn" class="confirm-btn">PAGO</button>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="../js/main.js"></script>
</body>
</html>
